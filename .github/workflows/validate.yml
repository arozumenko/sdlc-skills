name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bundles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate bundles
        run: node bin/validate-bundles.mjs

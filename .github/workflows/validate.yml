name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bundles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate bundles
        run: node bin/validate-bundles.mjs
      - name: Validate bundle mirrors are in sync with canonical
        run: node bin/sync-bundles.mjs --check

  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install skills-ref
        run: pip install "git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref"
      - name: Validate skills against the Agent Skills spec
        run: |
          status=0
          for dir in skills/*/; do
            if [ -f "$dir/SKILL.md" ]; then
              echo "::group::$dir"
              skills-ref validate "$dir" || status=1
              echo "::endgroup::"
            fi
          done
          exit $status
